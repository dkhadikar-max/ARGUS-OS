<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="tealArm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F5E8"/>
      <stop offset="100%" stop-color="#00A896"/>
    </linearGradient>
    <linearGradient id="whiteArm" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#C8D0D9"/>
    </linearGradient>
    <filter id="tealGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="120" height="120" rx="24" fill="#0A1628"/>
  <polygon points="60,85 35,35 45,35 60,65" fill="url(#tealArm)" filter="url(#tealGlow)"/>
  <polygon points="60,85 75,35 85,35 60,65" fill="url(#whiteArm)"/>
  <circle cx="60" cy="85" r="4" fill="#00F5E8" filter="url(#tealGlow)"/>
</svg>
